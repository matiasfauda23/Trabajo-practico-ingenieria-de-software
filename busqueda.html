<!doctype html>
<html lang="en">
    <head>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link rel="stylesheet" href="css/estilos.css" />
    </head>

    <body>
        <h1>Busqueda de talleres</h1>

        <section id="filtros-busqueda">
            <input
                type="text"
                id="filtro-nombre"
                placeholder="Buscar por nombre del taller"
            />
            <select id="filtro-categoria">
                <option value="">Todas las categorias</option>
            </select>
        </section>

        <div id="mapa"></div>
        <ul id="lista-talleres"></ul>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="js/data/datos.js"></script>
        <script type="module" src="js/busqueda.js"></script>
    </body>
</html>
